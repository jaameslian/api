<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        display: flex;
        height: 100vh;
        width: 100vw;
        flex-wrap: wrap;
        align-content: center;
        justify-content: center;
        margin: 0px;
        padding: 0px;
        /* background-color: rgb(255, 182, 234); */
    }

    .container {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white;
        width: 50%;
        height: 50%;
        flex-direction: column;
        gap: 5rem;
    }

    .status-bar {
        width: 90%;
        height: clamp(2rem, 10%, 80rem);
        box-shadow: 0rem 0rem 0rem .5rem #000000;
        border-radius: .5rem;
        overflow: hidden;
    }

    .status-bar>.status {
        color: rgba(0, 0, 0, 0%);
        background-color: pink;
        height: 100%;
        transition: all 1s ease;
    }

    button {
        all: unset;
        display: flex;
        position: relative;
        width: 5rem;
        height: 2.5rem;
        background-color: pink;
        justify-content: center;
        align-items: center;
        color:white;
        overflow: hidden;
    }

    button:hover {
        cursor: pointer;
        border-radius: 4px;
    }

    button > .indicator {
        position: absolute;
        width: 1rem;
        height: 1rem;
        top: 50%;
        left: 50%;
        background-color: rgba(255,255,255,0.5);
        border-radius: 100%;
        animation: indicatorRipple;
        animation-duration: 0.5s;
        transform-origin: center center;
        transform: scale(0);
        /* animation-iteration-count: infinite; */
    }

    @keyframes indicatorRipple {
        to {transform: scale(10);}
    }
</style>

<body>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const statusBars = document.querySelectorAll(".status-bar")
            statusBars.forEach((statusBar) => {
                statusBar.children[0].style.width = statusBar.innerText
            })
        })
    </script>
    <div class="container">
        <div class="status-bar">
            <div class="status" data-status-percentage="50%">
                50%
            </div>
        </div>
        <button>
            Example
            <span class="indicator"></span>
        </button>
    </div>
</body>

</html>
