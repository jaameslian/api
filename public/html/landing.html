<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing</title>
    <script type="module" src="../api/src/script/landing.js"></script>
    <link href="../api/src/css/index.css" rel="stylesheet">
</head>
<style>
    .outer-container {
        margin: 0px;
        padding: 0px;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(#000, #627496);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        display: flex;
        flex-direction: row;
        width: 70vw;
        height: 30vh;
        justify-content: space-evenly;
        align-items: center;
    }

    .container>* {
        width: 50%;
        height: 100%;
    }

    .intro-pfp {
        overflow: hidden;
        width: 20vw;
        height: 20vw;
        object-fit: cover;
        border-radius: 50%;
    }

    .intro {
        align-self: center;
        font-family: var(--primary-font);
        color: #ffffff;
    }

    .star {
        position: absolute;
        border-radius: 100%;
        /* width: 2px;
        height: 2px; */
        background-color: white;
        /* z-index: -1; */
        transition: all 1s linear;
    }

    .sparkle {
        box-shadow: 0px 0px 0px 1px #ffffff;
        opacity: 1;
    }

    .intro-and-icons {
        display: flex;
        height: 30vh;
        flex-direction: column;
        justify-content: space-around;
    }

    .intro-icons {
        display: flex;
        flex-direction: row;
        width: 100%;
    }

    .intro-icons > * > * {
        height: 2rem;
        width: 2rem;
        cursor: pointer;
        padding: 0 .5rem 0 .5rem;
    }

</style>

<body id="body">
    <div class="outer-container" id="outer-container">
        <div class="container">
            <img src="" alt="" class="intro-pfp">
            <!-- ../img/IMG_4067.jpg -->
            <div class="intro-and-icons">
                <p id="intro" class="intro">Hey👋! My name is James Lian. I'm currently a student studying at the University of Illinois at Urbana-Champaign. This is my portfolio site, it's currently under construction. View my Github to see what's going on!
                </p>
                <div id="intro-icons" class="intro-icons">
                    <a href="https://github.com/jaameslian"><img src="/api/src/icons/github.svg"></a>
                    <a href="https://linkedin.com/in/lianjames"><img src="/api/src/icons/linkedin.svg"></a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
